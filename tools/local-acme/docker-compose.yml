# Fully-local ACME simulation harness for RoboCertSentry integration testing.
#
# Stands up a Plesk Obsidian server, a Pebble ACME CA, and pebble-challtestsrv as
# the DNS that points the fake test domain at the Plesk container, so a real ACME
# issuance can be driven end to end with no public box, domain, or Let's Encrypt.
#
# Static IPs make the DNS mapping deterministic: challtestsrv answers every name
# with the Plesk IP, so Pebble's validator reaches Plesk's own web server on :80.

name: rcs-acme-sim

networks:
  acme:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:
  challtestsrv:
    image: ghcr.io/letsencrypt/pebble-challtestsrv:latest
    command: -defaultIPv4 172.28.0.10 -defaultIPv6 ""
    networks:
      acme:
        ipv4_address: 172.28.0.30
    ports:
      - "8055:8055"

  pebble:
    image: ghcr.io/letsencrypt/pebble:latest
    command: -config /conf/pebble-config.json -dnsserver 172.28.0.30:8053
    environment:
      PEBBLE_VA_NOSLEEP: "1"
      PEBBLE_VA_ALWAYS_VALID: "0"
    volumes:
      - ./pebble-config.json:/conf/pebble-config.json:ro
    networks:
      acme:
        ipv4_address: 172.28.0.20
    ports:
      - "14000:14000"
      - "15000:15000"
    depends_on:
      - challtestsrv

  plesk:
    image: plesk/plesk:latest
    privileged: true
    cgroup: host
    hostname: plesk-sim
    networks:
      acme:
        ipv4_address: 172.28.0.10
    ports:
      - "8443:8443"
      - "8880:80"
    depends_on:
      - pebble
