# Spoof front for acme-v02.api.letsencrypt.org used by the local ACME sim.
#
# Plesk's Let's Encrypt extension hardcodes the production directory URL (its
# --server flag is ignored because the code is encrypted), so this nginx answers
# that hostname and rewrites only the directory path (/directory -> Pebble /dir).
# It forwards with Host: pebble so Pebble emits pebble:14000 URLs, which Plesk then
# talks to directly (it already trusts the Pebble CA and resolves the name).

events {}

http {
    server {
        listen 443 ssl;
        server_name acme-v02.api.letsencrypt.org;

        ssl_certificate     /conf/certs/acme.crt;
        ssl_certificate_key /conf/certs/acme.key;

        location = /directory {
            proxy_pass https://172.28.0.20:14000/dir;
            proxy_ssl_verify off;
            proxy_set_header Host pebble:14000;
        }

        location / {
            proxy_pass https://172.28.0.20:14000;
            proxy_ssl_verify off;
            proxy_set_header Host pebble:14000;
        }
    }
}
